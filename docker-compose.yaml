services:
  db:
    container_name: postgres-spring-boot
    image: postgres:latest
    environment:
      POSTGRES_USER: zenloww
      POSTGRES_PASSWORD: password
      POSTGRES_DB: zenloww
    volumes:
      - db:/zenloww
    ports:
      # Optional: make exposed port "5332:5432
      - "5432:5432"
    networks:
      - db
    restart: unless-stopped

# If you have more than one container and want them to communicate through same network
networks:
  db:
    driver: bridge

volumes:
  db: